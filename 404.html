<!DOCTYPE html>
<html lang="en">
  <head>
    <title>404 — Page Not Found</title>

    <!-- ====== Meta ====== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ====== CSS ====== -->
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        padding: 0;
        border-radius: 0;
      }

      body.dark {
        background: #000;
        color: #fff;
      }

      body.light {
        background: #fff;
        color: #000;
      }

      main {
        text-align: center;
        padding: 2rem;
      }

      h1 {
        font-size: 6rem;
        font-weight: 700;
        margin: 0 0 1rem 0;
        text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
      }

      p { 
        font-size: 1.4rem;
        font-weight: 500;
        margin: 0 0 2rem 0;
      }

      a {
        display: inline-block;
        font-size: 1rem;
        font-weight: 500;
        padding: 0.85rem 1.5rem;
        background: #171992;
        color: #fff;
        text-decoration: none;
        border-radius: 0.4rem;
        transition: 0.4s ease, transform 0.4s ease;
      }

      a:hover {
        transform: scale(1.02);
        background: #2224ac;
      }
    </style>
  </head>

    <body>

    <main>
      <h1>404</h1>
      <p>The page you’re looking for doesn’t exist or has been moved.</p>
      <a href="/">Go back home</a>
    </main>

    <script type="module" src="/js/themes.js"></script>
  </body>
</html>
